<!doctype html>
<html>
  <head>
    <title>Welcome!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: rgb(48, 48, 48);
        color: white;
        text-align: center;
        font-family: "Noto Sans";
      }
      h1 {
      	font-size: 100px;
        margin-bottom: 0px;
      }
      h2 {
        font-size: 40px;
      }
      p {
      	font-size: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Hello, Rayyan</h1>
    <h2 id="time">Time</h2>
    <p id="date">Date</p>
    <p id="randomgreeting">Fine evening innit luv</p>
  </body>
  <script>
    const date = document.getElementById("date");
    const time = document.getElementById("time");
    
    function formatTime(number) {
      return number < 10 ? '0' + number : number;
    }
    
    function getDateAndTime() {
      // time
      let now = new Date();
      let hours = now.getHours();
      let minutes = String(formatTime(now.getMinutes()));
      let seconds = String(formatTime(now.getSeconds()));

      if (hours > 12) {
        hours = hours - 12
        hours = String(formatTime(hours));
      }
      
      const timeString = `${hours}:${minutes}:${seconds}`
      time.textContent = timeString

      // date
      const options = {
        weekday: 'long',
        month: 'long',
        day: 'numeric'
      };

      const formattedDate = now.toLocaleDateString('en-US', options);
      date.textContent = formattedDate;
    }

    function randomGreeting() {
      const greetings = {
        "miku dayo",
        "Fine evening innit luv",
        "enrique",
        "welcome to the underground",
      };

      function pickRandom() {
        let randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
        document.getElementById('randomgreeting').value = randomGreeting;
      }
    }
    
    randomGreeting();
    getDateAndTime();
    setInterval(getDateAndTime, 1000);
  </script>
</html>
